version: '3.8'
services:
  db:
    image: postgres:15
    container_name: postgres_vehiculos
    restart: always
    environment:
      POSTGRES_USER: kevin
      POSTGRES_PASSWORD: espe123
      POSTGRES_DB: vehiculos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
